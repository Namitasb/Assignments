<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="question6_solution3.css">
</head>
<body>

<div class="container">
  <form class="signup-form">
    <h2>Sign Up</h2>

    <div class="input-group">
      <input type="text" required>
      <label>First Name</label>
    </div>

    <div class="input-group">
      <input type="text" required>
      <label>Last Name</label>
    </div>

    <div class="input-group">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Password</label>
    </div>

    <p class="login-text">Already a member? <a href="#">Log In</a></p>

    <button type="submit">Sign up</button>

    <p class="error-text">
      If an error occurs when filling a form, a message will <br>show here.
    </p>
  </form>
</div>

</body>
</html>
