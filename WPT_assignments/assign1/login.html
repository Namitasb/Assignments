<html>
    <head>
        <title>Login Page</title>
        <style>
            *{
                font-family: segoe ui light ;
            }
            body{
                background: linear-gradient(180deg,#673AB7, #F44336);
            }
            #container{
                width: 450px;
                height: 400px;
                background-color: white;
                text-align: center;
                margin: 100px auto ;
                border-radius: 20px;
            }
           #container h1{
                padding-top: 30px;
                padding-bottom: 20px;
            }
            .form-control{
                margin-bottom: 30px;
            }
            .form-control input{
                padding-top: 15px;
                padding-bottom: 15px;
                width: 65%;
                border:0;
                border-bottom-width: 2px;
                border-bottom-style: solid;
                border-bottom-color: #BDBDBD;
                outline: 0;
            }
            .form-control button{
                margin-top: 10px;
                padding-top: 10px;
                padding-bottom: 10px;
                width: 28%;
                background: white;
                border-radius: 15px;
                border-color: #673AB7;
                border-width: 1;
                border-style: solid;
                color: #673AB7;
                cursor: pointer;
                transition: background 0.3s;
            }
            .form-control button:hover{
                background: #673AB7;
                color: white;
            }
            a{
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div id="container">
            <h1>Login</h1>
            <form>
                <div class="form-control">
                    <input type="text" placeholder="Enter Username">
                </div>
                <div class="form-control">
                    <input type="password" placeholder="Enter Password">
                </div>
                <div class="form-control">
                    <button type="submit">Login</button>
                </div>
                
            </form>
            <p>Need Account? <a href="#">Sign Up</a></p>
        </div>
    </body>
</html>
